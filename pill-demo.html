<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agent Pill — 原型演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void:        #030812;
    --void-deep:   #010408;
    --panel-bg:    rgba(4,12,28,0.92);
    --panel-edge:  rgba(54,82,128,0.28);
    --starlight:   #e2edff;
    --starlight-dim: rgba(205,225,252,0.94);
    --signal:      #68a8ff;
    --signal-bright: #8cc4ff;
    --signal-glow: rgba(80,140,240,0.35);
    --sol:         #f0b848;
    --sol-bright:  #ffcc60;
    --sol-glow:    rgba(240,170,50,0.3);
    --nebula:      #a088e0;
    --font-mono:   'JetBrains Mono', monospace;
    --font-hud:    'Orbitron', system-ui, sans-serif;
    --font-body:   'Noto Sans SC', system-ui, sans-serif;
    --snap: 0.12s cubic-bezier(0.23,1,0.32,1);
    --glide: 0.28s cubic-bezier(0.23,1,0.32,1);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--void-deep);
    color: var(--starlight-dim);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    overflow: hidden;
  }

  /* Ambient space bg */
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(800px 500px at 50% 40%, rgba(12,28,60,0.2), transparent 70%),
      radial-gradient(400px 300px at 30% 60%, rgba(8,16,40,0.15), transparent 60%),
      var(--void-deep);
  }

  /* Star field */
  body::after {
    content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 10% 12%, rgba(200,220,255,0.7), transparent),
      radial-gradient(0.8px 0.8px at 25% 8%, rgba(190,215,255,0.5), transparent),
      radial-gradient(1.2px 1.2px at 42% 18%, rgba(210,230,255,0.65), transparent),
      radial-gradient(0.6px 0.6px at 58% 10%, rgba(180,210,255,0.45), transparent),
      radial-gradient(1px 1px at 72% 22%, rgba(200,220,255,0.6), transparent),
      radial-gradient(0.8px 0.8px at 85% 15%, rgba(190,215,255,0.5), transparent),
      radial-gradient(1px 1px at 18% 38%, rgba(170,140,230,0.35), transparent),
      radial-gradient(0.8px 0.8px at 35% 45%, rgba(240,190,80,0.3), transparent),
      radial-gradient(1.2px 1.2px at 55% 42%, rgba(170,140,230,0.3), transparent),
      radial-gradient(0.8px 0.8px at 68% 48%, rgba(240,190,80,0.35), transparent),
      radial-gradient(1px 1px at 82% 38%, rgba(170,140,230,0.3), transparent);
    animation: drift 120s linear infinite;
  }
  @keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(-6px,-8px); }
  }

  /* ═══ Layout ═══ */
  .demo-row {
    display: flex; align-items: center; gap: 80px; z-index:2;
  }
  .demo-col {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .demo-label {
    font-family: var(--font-hud);
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(140,180,220,0.5);
  }
  .demo-arrow {
    font-size: 28px; color: rgba(140,180,220,0.2);
  }

  /* State toggle button */
  #toggle-btn {
    z-index:2;
    font-family: var(--font-hud);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 28px;
    background: rgba(20,40,70,0.4);
    color: var(--starlight-dim);
    border: 1px solid rgba(60,100,170,0.3);
    cursor: pointer;
    border-radius: 0;
    transition: all var(--snap);
  }
  #toggle-btn:hover {
    background: rgba(30,55,95,0.55);
    border-color: rgba(80,130,200,0.45);
    box-shadow: 0 0 30px rgba(50,100,180,0.12);
  }
  #toggle-state {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(140,180,220,0.4);
    z-index: 2;
  }

  /* ═══════════════════════════════════════════════
     PILL — demo adapter (original uses #chat-panel)
     ═══════════════════════════════════════════════ */

  .chat-pill {
    position: relative;
    width: 48px; min-width: 48px;
    height: 48px; min-height: 48px;
    background: var(--panel-bg);
    backdrop-filter: blur(20px) saturate(0.6);
    -webkit-backdrop-filter: blur(20px) saturate(0.6);
    border: 1px solid rgba(70,110,180,0.36);
    border-radius: 50%;
    z-index: 50;
    display: flex; flex-direction: column;
    opacity: 1; pointer-events: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 22px rgba(60,100,180,0.1);
    cursor: pointer;
    background: radial-gradient(circle at 35% 30%, rgba(30,60,110,0.35), rgba(4,12,28,0.96) 70%);
    border-color: rgba(90,140,220,0.28);
    transition: transform var(--glide), border-color var(--glide), box-shadow var(--glide), background var(--glide);
  }
  .chat-pill:hover {
    border-color: rgba(170,220,255,0.55);
    box-shadow:
      0 2px 24px rgba(0,0,0,0.5),
      0 0 52px rgba(120,180,255,0.35),
      inset 0 0 24px rgba(80,140,240,0.08);
    transform: scale(1.06);
    background: radial-gradient(circle at 35% 30%, rgba(40,75,130,0.4), rgba(6,18,38,0.96) 70%);
  }

  /* ── Outer atmosphere — breathing halo ── */
  .chat-pill::before {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    background: radial-gradient(circle, rgba(80,140,240,0.07) 0%, transparent 70%);
    animation: pill-breathe 4s ease-in-out infinite;
    pointer-events: none;
    opacity: 1;
    transition: opacity var(--glide);
  }
  .chat-pill:hover::before {
    background: radial-gradient(circle, rgba(120,180,255,0.12) 0%, transparent 70%);
  }

  /* ── Glass edge highlight — crisp inner ring ── */
  .chat-pill::after {
    content: ''; position: absolute; inset: 3px; border-radius: 50%;
    border: 1px solid rgba(120,170,240,0.12);
    pointer-events: none;
    opacity: 1;
    transition: opacity var(--glide), border-color var(--glide);
  }
  .chat-pill:hover::after {
    border-color: rgba(170,220,255,0.22);
  }

  /* ── Inner tracking ring — orbital tracer ── */
  .chat-pill-inner-ring {
    position: absolute; inset: 6px; border-radius: 50%;
    border: 1px solid rgba(80,140,240,0.1);
    animation: pill-inner-spin 18s linear infinite;
    pointer-events: none; opacity: 1;
    transition: opacity var(--glide), border-color var(--glide);
  }
  .chat-pill:hover .chat-pill-inner-ring {
    border-color: rgba(160,210,255,0.28);
  }
  .chat-pill-orbit-dot {
    position: absolute; top: -3px; left: calc(50% - 3px);
    width: 6px; height: 6px;
    background: var(--signal-bright);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(120,180,255,0.7), 0 0 2px rgba(200,230,255,0.9);
    transition: background var(--glide), box-shadow var(--glide);
  }
  .chat-pill:hover .chat-pill-orbit-dot {
    background: #e0f0ff;
    box-shadow: 0 0 16px rgba(170,220,255,0.9), 0 0 4px rgba(220,240,255,1);
  }

  /* ── Core crystal — diamond + center dot ── */
  .chat-pill-star {
    display: flex;
    position: absolute; inset: 0;
    align-items: center; justify-content: center;
    color: var(--signal);
    opacity: 1; pointer-events: auto;
    transition: opacity 0.2s ease, color var(--glide), filter var(--glide);
  }
  .chat-pill:hover .chat-pill-star {
    color: #d8eeff;
    filter: drop-shadow(0 0 18px rgba(150,210,255,0.8));
  }

  /* ── Pill badge — event counter ── */
  .chat-pill-badge {
    position: absolute; top: -5px; right: -5px;
    min-width: 18px; height: 18px; padding: 0 5px;
    font-family: var(--font-mono); font-size: 9px; font-weight: 700; line-height: 18px; text-align: center;
    background: var(--fail); color: #fff;
    border-radius: 9px;
    box-shadow: 0 0 8px rgba(217,68,68,0.5);
    pointer-events: none;
    opacity: 0; transform: scale(0.6);
    transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .chat-pill-badge.show {
    opacity: 1; transform: scale(1);
  }

  /* ── Running state — amber heartbeat ── */
  .chat-pill.chat-pill-running {
    box-shadow:
      0 2px 20px rgba(0,0,0,0.4),
      0 0 36px rgba(240,170,50,0.18),
      inset 0 0 20px rgba(240,170,50,0.04);
    border-color: rgba(240,170,50,0.2);
    background: radial-gradient(circle at 35% 30%, rgba(240,170,50,0.1), rgba(4,12,28,0.96) 70%);
  }
  .chat-pill.chat-pill-running .chat-pill-star {
    color: var(--sol);
    animation: pill-core-pulse 1.6s ease-in-out infinite;
  }
  @keyframes pill-core-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(240,170,50,0.4)); transform: scale(1); }
    50%      { filter: drop-shadow(0 0 22px rgba(255,190,60,0.7)); transform: scale(1.06); }
  }
  .chat-pill.chat-pill-running::before {
    background: radial-gradient(circle, rgba(240,170,50,0.1) 0%, transparent 65%);
    animation: pill-breathe 2.5s ease-in-out infinite;
  }
  .chat-pill.chat-pill-running::after {
    border-color: rgba(240,170,50,0.14);
  }
  .chat-pill.chat-pill-running .chat-pill-inner-ring {
    border-color: rgba(240,170,50,0.12);
    animation-duration: 4.5s;
  }
  .chat-pill.chat-pill-running .chat-pill-orbit-dot {
    background: var(--sol-bright);
    box-shadow: 0 0 12px rgba(240,180,60,0.8), 0 0 3px rgba(255,210,100,0.9);
  }

  /* Keyframes */
  @keyframes pill-inner-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pill-breathe {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.85; }
  }

  /* ═══ Comparison: old vs new ═══ */
  .compare-section {
    z-index:2; display:flex; flex-direction:column; align-items:center; gap:20px;
  }
  .compare-title {
    font-family: var(--font-hud);
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(140,180,220,0.4);
    margin-bottom: 8px;
  }
  .compare-row {
    display: flex; gap: 100px; align-items: flex-start;
  }
  .compare-item {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .compare-item .sub-label {
    font-family: var(--font-mono); font-size: 8px;
    color: rgba(140,180,220,0.35);
  }
</style>
</head>
<body>

<div class="demo-label" style="margin-bottom:-30px;z-index:2">AGENT PILL · HOLOGRAM</div>

<div class="demo-row">
  <!-- Idle -->
  <div class="demo-col">
    <div class="demo-label">闲置</div>
    <div id="pill-idle" class="chat-pill" style="position:relative">
      <div class="chat-pill-star">
        <svg viewBox="0 0 32 32" width="22" height="22">
          <circle cx="16" cy="16" r="3" fill="currentColor" opacity="0.9"/>
          <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.45"/>
        </svg>
      </div>
      <div class="chat-pill-inner-ring"><div class="chat-pill-orbit-dot"></div></div>
      <div class="chat-pill-badge"></div>
    </div>
  </div>

  <span class="demo-arrow">→</span>

  <!-- Running -->
  <div class="demo-col">
    <div class="demo-label">运行中</div>
    <div id="pill-running" class="chat-pill chat-pill-running" style="position:relative">
      <div class="chat-pill-star">
        <svg viewBox="0 0 32 32" width="22" height="22">
          <circle cx="16" cy="16" r="3" fill="currentColor" opacity="0.9"/>
          <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.45"/>
        </svg>
      </div>
      <div class="chat-pill-inner-ring"><div class="chat-pill-orbit-dot"></div></div>
      <div class="chat-pill-badge show">5</div>
    </div>
  </div>

  <span class="demo-arrow">→</span>

  <!-- Running + badge -->
  <div class="demo-col">
    <div class="demo-label">运行中 + 角标</div>
    <div class="chat-pill chat-pill-running" style="position:relative">
      <div class="chat-pill-star">
        <svg viewBox="0 0 32 32" width="22" height="22">
          <circle cx="16" cy="16" r="3" fill="currentColor" opacity="0.9"/>
          <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.45"/>
        </svg>
      </div>
      <div class="chat-pill-inner-ring"><div class="chat-pill-orbit-dot"></div></div>
      <div class="chat-pill-badge show">12</div>
    </div>
  </div>
</div>

<div style="z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px">
  <div id="toggle-state">当前: 闲置 (悬停看 hover / 按钮切运行 / 运行中点击 pill 模拟收到消息)</div>
  <button id="toggle-btn">切换运行状态</button>
</div>

<script>
  // Toggle running state on the left pill
  const pill = document.getElementById('pill-idle');
  const stateLabel = document.getElementById('toggle-state');
  let running = false;

  let badgeCount = 0;
  document.getElementById('toggle-btn').addEventListener('click', () => {
    running = !running;
    if (running) {
      pill.classList.add('chat-pill-running');
      badgeCount = 3;
      const badge = pill.querySelector('.chat-pill-badge');
      badge.textContent = String(badgeCount);
      badge.classList.add('show');
      stateLabel.textContent = '当前: 运行中 (Agent 后台思考) — 角标 3';
    } else {
      pill.classList.remove('chat-pill-running');
      pill.querySelector('.chat-pill-badge').classList.remove('show');
      stateLabel.textContent = '当前: 闲置 (鼠标悬停看 hover)';
    }
  });

  // Click left pill to simulate "bump" (mock incoming agent events)
  pill.addEventListener('click', (e) => {
    if (!running) return;
    e.stopPropagation();
    badgeCount++;
    const badge = pill.querySelector('.chat-pill-badge');
    badge.textContent = badgeCount > 99 ? '99+' : String(badgeCount);
    badge.classList.add('show');
    // Pop animation
    badge.style.transform = 'scale(1.3)';
    setTimeout(() => { badge.style.transform = ''; }, 200);
    stateLabel.textContent = `当前: 运行中 — 收到 ${badgeCount} 条事件`;
  });
</script>

</body>
</html>

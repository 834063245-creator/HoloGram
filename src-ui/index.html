      font-size: 9px; color: rgba(105, 145, 200, 0.35);
      padding: 4px 0; line-height: 1.4;
    }
    .sp-hint a {
      color: rgba(100, 140, 200, 0.55);
      transition: color var(--snap);
    }
    .sp-hint a:hover { color: var(--signal); }

    /* Footer */
    .sp-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 10px 16px; flex-shrink: 0;
      border-top: 1px solid rgba(40, 60, 100, 0.15);
    }
    .sp-btn {
      font-family: var(--font-hud); font-size: 8px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      padding: 7px 18px; border-radius: 3px; cursor: pointer;
      transition: all var(--snap);
      display: flex; align-items: center; gap: 4px;
    }
    .sp-btn-cancel {
      background: rgba(15, 18, 28, 0.5); color: rgba(145, 180, 225, 0.6);
      border: 1px solid rgba(30, 45, 70, 0.3);
    }
    .sp-btn-cancel:hover { background: rgba(20, 25, 38, 0.6); color: var(--starlight-dim); }
    .sp-btn-save {
      background: rgba(25, 45, 80, 0.5); color: var(--signal);
      border: 1px solid rgba(60, 100, 170, 0.3);
    }
    .sp-btn-save:hover {
      background: rgba(35, 60, 110, 0.6);
      box-shadow: 0 0 10px rgba(50, 100, 180, 0.12);
    }
    .sp-btn-ok { color: var(--pass) !important; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       SPACE BACKGROUND
       ═══════════════════════════════════════════════════════════════ -->
  <div id="space">
    <div class="ambient"></div>
    <div class="star-layer layer-1"></div>
    <div class="star-layer layer-2"></div>
    <div class="star-layer layer-3"></div>
    <div class="holo-grid"></div>
    <div class="orbital-ring"></div>
    <div class="orbital-ring"></div>
  </div>
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <!-- ═══════════════════════════════════════════════════════════════
       TOOLBAR
       ═══════════════════════════════════════════════════════════════ -->
  <div id="toolbar">
    <div id="mode-switch">
      <button class="mode-btn" data-mode="minimal" data-icon="mode-minimal" title="极简骨架"></button>
      <button class="mode-btn active" data-mode="standard" data-icon="mode-standard" title="标准星图"></button>
      <button class="mode-btn" data-mode="full" data-icon="mode-full" title="观赏模式"></button>
    </div>
    <span class="sep"></span>
    <button id="btn-fold" data-icon="fold" title="折叠/展开社区星系 (F)">折叠</button>
    <span class="sep"></span>
    <span class="brand" data-icon="brand">全息观测站</span>
    <span class="sep"></span>
    <button id="btn-explorer" data-icon="folder-closed" title="文件浏览器 (Ctrl+E)">资源</button>
    <button id="btn-open" data-icon="folder-open">打开文件夹</button>
    <button id="btn-check" data-icon="check" title="简报面板">简报</button>
    <button id="btn-chat" data-icon="chat" title="打开对话 (Ctrl+L)">对话</button>
    <span class="sep"></span>
    <button id="btn-diff" data-icon="diff" title="变更回看着色 (Ctrl+D)">变更</button>
    <button id="btn-timeline" data-icon="timeline" title="决策时间轴">时间轴</button>
    <button id="btn-constraints" data-icon="constraints" title="约束配置">约束</button>
    <button id="btn-terminal" data-icon="terminal" title="终端 (Ctrl+`)">终端</button>
    <span class="sep"></span>
    <button id="btn-settings" data-icon="constraints" title="设置 (Ctrl+,)">设置</button>
    <span class="sep"></span>
    <span class="spacer"></span>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="SEARCH SYMBOL…" autocomplete="off" spellcheck="false" />
      <button id="search-btn" data-icon="search"></button>
    </div>
    <span id="tb-path"></span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       WELCOME
       ═══════════════════════════════════════════════════════════════ -->
  <div id="welcome">
    <h1>◈ HOLOGRAM</h1>
    <p>DEEP SPACE CODE TOPOLOGY · AI-ASSISTED ANALYSIS</p>
    <button class="big-btn" id="btn-welcome-open">◈ INITIALIZE WORKSPACE</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       GRAPH — Three.js canvas lives here
       ═══════════════════════════════════════════════════════════════ -->
  <div id="graph"></div>

  <!-- ═══════════════════════════════════════════════════════════════
       DOCK TABS
       ═══════════════════════════════════════════════════════════════ -->
  <div id="left-tabs" style="">
    <button class="dock-tab" data-panel="explorer" data-icon="folder-closed">资源</button>
    <button class="dock-tab" data-panel="timeline" data-icon="timeline">时间轴</button>
  </div>
  <div id="right-tabs" style="">
    <button class="dock-tab" data-panel="chat" data-icon="chat">对话</button>
    <button class="dock-tab" data-panel="constraints" data-icon="constraints">约束</button>
  </div>
  <div id="bottom-tabs" style="">
    <button class="dock-tab" data-panel="check" data-icon="check">简报</button>
    <button class="dock-tab" data-panel="terminal" data-icon="terminal">终端</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       STATUS BAR
       ═══════════════════════════════════════════════════════════════ -->
  <div id="status">
    <span class="left" id="status-text">◈ STATUS NOMINAL · 就绪</span>
    <span class="right">
      <span id="status-nodes"></span>
      <span id="status-edges"></span>
